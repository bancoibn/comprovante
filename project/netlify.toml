[build]
  functions = "netlify/functions"
  publish = "."

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/netlify.toml"
  to = "/404"
  status = 404

[[redirects]]
  from = "/netlify/*"
  to = "/404"
  status = 404
  force = true

[functions]
  node_bundler = "esbuild"